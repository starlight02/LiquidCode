# Use GitHub native auto-merge for Dependabot PRs.
# Requires repo auto-merge + branch ruleset required checks (Quality / Tests / PKG).
# This workflow only enables auto-merge; it does not merge by itself and does not
# listen to workflow_run/push, so it will not create phantom 0s failures on main.
name: Enable Dependabot auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write
  # Action-pin PRs edit workflow YAML; merge needs the workflows scope.
  workflows: write

jobs:
  enable:
    name: Enable auto-merge
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Native auto-merge waits for required status checks from the ruleset,
          # then squash-merges. No workflow_run polling, no custom merge script.
          gh pr merge --auto --squash "$PR_URL"
          echo "Auto-merge enabled for $PR_URL"
