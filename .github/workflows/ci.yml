name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Cancel superseded runs on the same ref; tag/release refs stay unique.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (SwiftLint / SwiftFormat / Periphery)
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select Xcode with modern macOS SDK
        run: ./scripts/ci-select-xcode.sh

      - name: Install quality tools
        run: |
          set -euo pipefail
          brew bundle install --file=Brewfile
          command -v swiftlint
          command -v swiftformat
          command -v periphery

      - name: Verify version metadata
        run: ./scripts/verify-version.sh

      - name: Run quality check
        run: ./scripts/quality-check.sh

  test:
    name: Xcode unit tests
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select Xcode with modern macOS SDK
        run: ./scripts/ci-select-xcode.sh

      - name: Cache DerivedData
        uses: actions/cache@v6
        with:
          path: .xcode-derived
          key: xcode-derived-${{ runner.os }}-${{ hashFiles('LiquidCode.xcodeproj/project.pbxproj', 'LiquidCode/**/*.swift', 'LiquidCodeTests/**/*.swift', 'Config/**') }}
          restore-keys: |
            xcode-derived-${{ runner.os }}-

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project LiquidCode.xcodeproj \
            -scheme LiquidCode \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .xcode-derived \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO

  build:
    name: PKG build (unsigned)
    runs-on: macos-26
    needs:
      - quality
      - test
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select Xcode with modern macOS SDK
        run: ./scripts/ci-select-xcode.sh

      - name: Cache DerivedData
        uses: actions/cache@v6
        with:
          path: .xcode-derived
          key: xcode-derived-release-${{ runner.os }}-${{ hashFiles('LiquidCode.xcodeproj/project.pbxproj', 'LiquidCode/**/*.swift', 'Config/**') }}
          restore-keys: |
            xcode-derived-release-${{ runner.os }}-

      - name: Xcode Release build
        run: |
          set -euo pipefail
          xcodebuild \
            -project LiquidCode.xcodeproj \
            -scheme LiquidCode \
            -configuration Release \
            -derivedDataPath .xcode-derived \
            -destination 'generic/platform=macOS' \
            build \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build ad-hoc PKG (arm64 smoke)
        env:
          RELEASE_SIGNING_REQUIRED: "0"
          LIQUIDCODE_ARCHS: "arm64"
          RELEASE_UPLOAD: "0"
          RELEASE_UPLOAD_DRY_RUN: "0"
        run: ./scripts/build-release.sh

      - name: Verify ad-hoc PKG
        env:
          REQUIRE_NOTARIZED: "0"
          LIQUIDCODE_ARCHS: "arm64"
        run: ./scripts/verify-release-artifacts.sh

      - name: Upload ad-hoc PKG
        uses: actions/upload-artifact@v7
        with:
          name: LiquidCode-macOS-adhoc-arm64-pkg
          path: |
            .build-release/*.pkg
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  release:
    name: Tag + publish unsigned release
    runs-on: ubuntu-latest
    needs:
      - build
    # Mainline only, never PRs. Idempotent: a release ships only when the
    # v${MARKETING_VERSION} tag/release does not exist yet, so bumping the Xcode
    # MARKETING_VERSION is what cuts a new release. GITHUB_TOKEN (contents: write)
    # can create the tag + release directly — no PAT, no workflow chaining.
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Resolve version and tag
        id: ver
        run: |
          set -euo pipefail
          out="$(./scripts/verify-version.sh)"
          version="$(printf '%s\n' "$out" | awk -F= '/^MARKETING_VERSION=/{print $2; exit}')"
          build="$(printf '%s\n' "$out" | awk -F= '/^CURRENT_PROJECT_VERSION=/{print $2; exit}')"
          [ -n "$version" ] && [ -n "$build" ] || { echo "Could not parse version metadata" >&2; exit 1; }
          {
            echo "version=$version"
            echo "build=$build"
            echo "tag=v$version"
          } >>"$GITHUB_OUTPUT"

      - name: Skip when the release already exists
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "fresh=false" >>"$GITHUB_OUTPUT"
            echo "Release $TAG already published; no version bump, nothing to ship."
          else
            echo "fresh=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Download the unsigned PKG built by CI
        if: steps.guard.outputs.fresh == 'true'
        uses: actions/download-artifact@v7
        with:
          name: LiquidCode-macOS-adhoc-arm64-pkg
          path: release-assets

      - name: Create and push the annotated tag
        if: steps.guard.outputs.fresh == 'true'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          BUILD: ${{ steps.ver.outputs.build }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already on origin; reusing it."
          else
            git tag -a "$TAG" -m "LiquidCode $TAG (build $BUILD, unsigned/ad-hoc)"
            git push origin "refs/tags/$TAG"
          fi

      - name: Publish the GitHub Release
        if: steps.guard.outputs.fresh == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          BUILD: ${{ steps.ver.outputs.build }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LiquidCode $TAG" \
            --notes "Automated unsigned/ad-hoc macOS PKG for $TAG (build $BUILD) from ${COMMIT:0:7}. Gatekeeper will warn — no Developer ID signature or notarization; not for production distribution." \
            release-assets/*.pkg
          echo "Published release $TAG with the unsigned PKG."
