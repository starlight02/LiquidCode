name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Keep the same quality + unit test gate as CI before shipping artifacts.
  preflight:
    name: Preflight (version + tests)
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode with modern macOS SDK
        run: ./scripts/ci-select-xcode.sh

      - name: Verify release tag matches MARKETING_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/verify-version.sh --tag "$GITHUB_REF_NAME"

      - name: Verify version metadata
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: ./scripts/verify-version.sh

      - name: Install quality tools
        run: brew bundle install --file=Brewfile

      - name: Quality check
        run: ./scripts/quality-check.sh

      - name: Unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project LiquidCode.xcodeproj \
            -scheme LiquidCode \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .xcode-derived \
            CODE_SIGNING_ALLOWED=NO

  macos-release:
    name: Build macOS release
    runs-on: macos-26
    needs: preflight
    permissions:
      contents: write
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      INSTALLER_SIGN_IDENTITY: ${{ secrets.INSTALLER_SIGN_IDENTITY }}
      LIQUIDCODE_ARCHS: "arm64 x86_64"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode with modern macOS SDK
        run: ./scripts/ci-select-xcode.sh

      - name: Verify release tag matches MARKETING_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/verify-version.sh --tag "$GITHUB_REF_NAME"

      - name: Select signing mode
        shell: bash
        run: |
          set -euo pipefail
          signing_names=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            CODESIGN_IDENTITY
            INSTALLER_SIGN_IDENTITY
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
          )

          present=0
          missing=0
          for name in "${signing_names[@]}"; do
            if [[ -n "${!name:-}" ]]; then
              present=$((present + 1))
            fi
          done

          if [[ "$present" -eq 0 ]]; then
            echo "SIGNING_MODE=unsigned" >>"$GITHUB_ENV"
            echo "No Apple signing secrets configured. Building unsigned/ad-hoc release artifacts."
            exit 0
          fi

          for name in "${signing_names[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing signing secret: $name" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Partial signing configuration is unsafe. Provide all signing secrets or remove them all for unsigned builds." >&2
            exit 1
          fi

          echo "SIGNING_MODE=signed" >>"$GITHUB_ENV"
          echo "Apple signing secrets configured. Building signed and notarized release."

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SIGNING_MODE}" != "signed" ]]; then
            echo "Skipping certificate import for unsigned build."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/liquidcode.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$RUNNER_TEMP}"

          echo "$APPLE_CERTIFICATE" | base64 --decode >"$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning | grep -F "$CODESIGN_IDENTITY" >/dev/null; then
            echo "CODESIGN_IDENTITY not found after import: $CODESIGN_IDENTITY" >&2
            security find-identity -v -p codesigning || true
            exit 1
          fi

      - name: Store notary credentials
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SIGNING_MODE}" != "signed" ]]; then
            echo "Skipping notary credentials for unsigned build."
            exit 0
          fi
          xcrun notarytool store-credentials LiquidCodeNotary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD"

      - name: Build PKG release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_NAME: LiquidCode ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${SIGNING_MODE}" == "signed" ]]; then
            export RELEASE_SIGNING_REQUIRED=1
            export NOTARY_KEYCHAIN_PROFILE=LiquidCodeNotary
            export CODESIGN_IDENTITY
            export INSTALLER_SIGN_IDENTITY
          else
            export RELEASE_SIGNING_REQUIRED=0
            unset CODESIGN_IDENTITY NOTARY_KEYCHAIN_PROFILE INSTALLER_SIGN_IDENTITY || true
          fi

          # build-release.sh only does real GH uploads when RELEASE_SIGNING_REQUIRED=1.
          # Signed tags: let the script create/attach. Unsigned tags: build only;
          # the dedicated "Attach artifacts to GitHub Release" step uploads instead.
          # workflow_dispatch always dry-runs the upload path for validation.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            export RELEASE_UPLOAD=1
            export RELEASE_UPLOAD_DRY_RUN=1
            export RELEASE_CREATE_DRAFT=0
          elif [[ "${SIGNING_MODE}" == "signed" && ( "${{ github.ref }}" == refs/tags/* || "${{ github.event_name }}" == "release" ) ]]; then
            export RELEASE_UPLOAD=1
            export RELEASE_UPLOAD_DRY_RUN=0
            export RELEASE_CREATE_DRAFT=1
          else
            export RELEASE_UPLOAD=0
            export RELEASE_UPLOAD_DRY_RUN=0
          fi

          if [[ "${SIGNING_MODE}" == "signed" ]]; then
            export RELEASE_NOTES="Signed and notarized macOS release for ${GITHUB_REF_NAME}. Assets: PKG installer."
          else
            export RELEASE_NOTES="Unsigned/ad-hoc macOS PKG for ${GITHUB_REF_NAME}. Gatekeeper will warn; not for production distribution."
          fi

          ./scripts/build-release.sh

      - name: Verify release outputs
        env:
          REQUIRE_NOTARIZED: ${{ env.SIGNING_MODE == 'signed' && '1' || '0' }}
          LIQUIDCODE_ARCHS: "arm64 x86_64"
        run: ./scripts/verify-release-artifacts.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LiquidCode-macOS-${{ env.SIGNING_MODE }}
          path: |
            .build-release/*.pkg
          if-no-files-found: error

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "${SIGNING_MODE}" == "unsigned" ]]; then
            NOTES="Unsigned/ad-hoc macOS PKG for $TAG_NAME. Gatekeeper will warn because this build has no Developer ID signature or notarization."
          else
            NOTES="Signed and notarized macOS release for $TAG_NAME. Assets: PKG installer."
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "LiquidCode $TAG_NAME" \
              --generate-notes \
              --notes "$NOTES" \
              || true
          fi

          gh release upload "$TAG_NAME" \
            .build-release/*.pkg \
            --clobber
