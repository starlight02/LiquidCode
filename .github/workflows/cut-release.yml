name: Cut Release

# Read MARKETING_VERSION from the Xcode project, create annotated tag vX.Y.Z,
# and push it so Release (on: push tags v*) builds artifacts.
#
# GitHub's default GITHUB_TOKEN cannot trigger other workflows on tag push.
# Prefer secret RELEASE_BOT_TOKEN (classic PAT or fine-grained with contents:write)
# so the tag push event reaches release.yml. Without it we still push the tag
# with GITHUB_TOKEN and create a draft GitHub Release (on: release published is
# not enough for draft — so we also workflow_dispatch Release as a fallback).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only print the tag that would be created"
        type: boolean
        default: false
      force:
        description: "Allow dirty tree / non-main branch (not recommended)"
        type: boolean
        default: false

concurrency:
  group: cut-release
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  cut:
    name: Tag from MARKETING_VERSION
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Prefer bot token so subsequent tag push triggers Release workflow.
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cut release tag
        id: cut
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          FORCE: ${{ inputs.force }}
          # secrets.X != '' is the usual presence check in Actions expressions.
          HAS_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' }}
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          args=()
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "$FORCE" == "true" ]]; then
            args+=(--force)
          fi

          # Ensure we tag main tip.
          git fetch origin main
          git checkout -B main origin/main

          if [[ "$DRY_RUN" == "true" ]]; then
            ./scripts/cut-release.sh "${args[@]}"
            exit 0
          fi

          TAG="$(./scripts/cut-release.sh "${args[@]}" | tail -n 1)"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "Created/pushed $TAG"

          if [[ "$HAS_BOT_TOKEN" != "true" ]]; then
            echo "RELEASE_BOT_TOKEN not set; GITHUB_TOKEN tag push will not chain-trigger workflows."
            echo "Dispatching Release workflow as a fallback (workflow_dispatch)."
            if ! gh workflow run release.yml --ref "$TAG"; then
              echo "Could not dispatch Release workflow; configure RELEASE_BOT_TOKEN for automatic tag-triggered builds."
            fi
          fi
