# Auto-merge Dependabot PRs only after the CI workflow completes successfully.
# CI already gates PKG build on quality + unit tests (ci.yml needs:).
name: Dependabot auto-merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

jobs:
  merge:
    name: Squash-merge Dependabot PR after CI build
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR and merge if Dependabot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Confirm the PKG build job itself succeeded (not just overall workflow).
          build_conclusion="$(
            gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
              --jq '.jobs[] | select(.name == "PKG build (unsigned)") | .conclusion' \
              | head -n 1
          )"
          echo "PKG build (unsigned) conclusion: ${build_conclusion:-missing}"
          if [[ "${build_conclusion:-}" != "success" ]]; then
            echo "Skipping merge: PKG build job did not succeed."
            exit 0
          fi

          # Map workflow_run head SHA -> open Dependabot pull request.
          pr_number="$(
            gh api "repos/${REPO}/commits/${HEAD_SHA}/pulls" \
              -H "Accept: application/vnd.github.groot-preview+json" \
              --jq '[.[] | select(.user.login == "dependabot[bot]" and .state == "open") | .number] | first // empty'
          )"
          if [[ -z "${pr_number:-}" ]]; then
            echo "No open Dependabot PR for ${HEAD_SHA}; nothing to merge."
            exit 0
          fi

          # Dependabot's login surfaces as "dependabot[bot]" via the REST API (pulls endpoint,
          # used above to resolve the PR) but as "app/dependabot" via the GraphQL-backed
          # `gh pr view`. Accept either spelling so the author recheck cannot reject a PR
          # the REST lookup already classified as Dependabot's.
          author_rest="$(gh api "repos/${REPO}/pulls/${pr_number}" --jq '.user.login')"
          if [[ "$author_rest" != "dependabot[bot]" ]]; then
            echo "PR #$pr_number REST author is $author_rest; refusing merge."
            exit 0
          fi

          echo "Squash-merging Dependabot PR #$pr_number (branch=$HEAD_BRANCH sha=$HEAD_SHA)"
          gh pr merge "$pr_number" --repo "$REPO" --squash --delete-branch
          echo "Merged PR #$pr_number"
